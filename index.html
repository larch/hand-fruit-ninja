<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>体感切水果 · Hand Fruit Ninja</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e18; font-family: -apple-system, "PingFang SC", system-ui, sans-serif; }
  #wrap { position: fixed; inset: 0; }
  /* 摄像头画面镜像，铺满 */
  #cam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: brightness(0.55) saturate(1.1); }
  #game { position: absolute; inset: 0; width: 100%; height: 100%; }
  #hud {
    position: absolute; top: env(safe-area-inset-top, 12px); left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 18px; pointer-events: none; z-index: 5;
  }
  .pill {
    background: rgba(10,14,26,.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.12); border-radius: 14px;
    padding: 8px 14px; color: #fff;
  }
  .pill .label { font-size: 11px; opacity: .6; letter-spacing: .5px; }
  .pill .val { font-size: 26px; font-weight: 700; line-height: 1.1; }
  #combo { color: #ffd34d; }
  #overlay {
    position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
    background: radial-gradient(circle at 50% 40%, rgba(20,26,44,.6), rgba(6,8,14,.95));
    color: #fff;
  }
  #overlay h1 { font-size: 34px; margin-bottom: 8px; letter-spacing: 1px; }
  #overlay p { font-size: 15px; opacity: .8; max-width: 320px; line-height: 1.6; margin-bottom: 22px; }
  #btn {
    pointer-events: auto; cursor: pointer;
    background: linear-gradient(135deg,#ff5f6d,#ffc371);
    color: #1a1200; font-weight: 800; font-size: 18px; letter-spacing: 1px;
    border: none; border-radius: 999px; padding: 16px 42px;
    box-shadow: 0 10px 30px rgba(255,95,109,.4);
  }
  #btn:active { transform: scale(.96); }
  #status { margin-top: 18px; font-size: 13px; opacity: .55; min-height: 18px; }
  .hidden { display: none !important; }
  #emoji { font-size: 60px; margin-bottom: 10px; }
  #finalScore { font-size: 20px; color:#ffd34d; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="wrap">
  <video id="cam" playsinline autoplay muted></video>
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="pill"><div class="label">分数 SCORE</div><div class="val" id="score">0</div></div>
    <div class="pill" id="timePill"><div class="label">时间 TIME</div><div class="val" id="time">∞</div></div>
    <div class="pill"><div class="label">连击 COMBO</div><div class="val" id="combo">x0</div></div>
    <div class="pill"><div class="label">生命 LIVES</div><div class="val" id="lives">❤❤❤</div></div>
  </div>

  <div id="overlay">
    <div id="emoji">🍉🔪</div>
    <h1>体感切水果</h1>
    <p>把手举到摄像头前，用<strong>食指指尖</strong>当刀。<br/>快速划过水果就切开，别切到炸弹 💣！<br/>漏掉水果会掉生命。</p>
    <div id="finalScore" class="hidden"></div>
    <button id="btn">开始游戏</button>
    <div id="status">需要 HTTPS + 允许摄像头</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
(() => {
  const video = document.getElementById('cam');
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const btn = document.getElementById('btn');
  const statusEl = document.getElementById('status');
  const hud = document.getElementById('hud');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const livesEl = document.getElementById('lives');
  const timeEl = document.getElementById('time');
  const timePill = document.getElementById('timePill');
  const finalScoreEl = document.getElementById('finalScore');
  const emojiEl = document.getElementById('emoji');
  const titleEl = overlay.querySelector('h1');

  let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ======================================================================
  //  ⚙️  参数调节区 CONFIG —— 想改难度/手感，只动这里就够了
  // ======================================================================
  const CONFIG = {
    lives: 3,              // 生命数

    // —— 出果节奏（间隔越大 = 出得越慢/越少）——
    startGap: 1700,        // 开局出果间隔(ms)，一开始一个一个慢慢来
    minGap:   600,         // 最快时的间隔(ms)，越小越密
    gapRampPerSec: 16,     // 每存活 1 秒，间隔缩短多少 ms（决定“变快”的速度）

    // —— 水果飞行速度（向上初速，越大飞越高越快）——
    startSpeed: 0.00105,   // 开局初速（×屏高/ms）飞得慢
    maxSpeed:   0.00185,   // 最快初速
    speedRampPerSec: 0.0000075, // 每秒增加多少初速
    speedRandom: 0.00035,  // 每个水果的随机浮动
    gravity: 0.0000030,    // 重力（越大回落越快、滞空越短）

    fruitSize: 0.075,      // 水果半径（×屏幕短边）

    // —— 同时出果数量（后期才变多，前期永远一个一个）——
    doubleAtSec: 28,       // 多少秒后开始偶尔出两个
    tripleAtSec: 55,       // 多少秒后偶尔出三个
    multiChance: 0.35,     // 进入多果阶段后，一次多出的概率

    // —— 炸弹 ——
    bombFreeSec: 12,       // 前若干秒是新手保护，绝不出炸弹
    bombChance:  0.14,     // 之后每个物体是炸弹的概率

    sliceSpeed: 12,        // 指尖切割速度阈值(px/帧)，越小越灵敏
  };
  // ======================================================================

  // ---------- 游戏状态 ----------
  const FRUITS = ['🍉','🍎','🍊','🍋','🍓','🍇','🥝','🍑','🍍'];
  let running = false;
  let score = 0, combo = 0, comboTimer = 0, lives = CONFIG.lives;
  let objects = [];   // 水果/炸弹
  let particles = [];
  let blades = [];    // 每只手的刀轨迹点 {x,y,age}
  let handPoints = []; // 当前帧指尖位置（已转成画布坐标）
  let lastSpawn = 0;
  let lastTs = 0;
  let startTime = 0, elapsed = 0, elapsedBase = 0; // elapsed = 本局已进行秒数（驱动难度）

  function reset() {
    score = 0; combo = 0; comboTimer = 0; lives = CONFIG.lives;
    objects = []; particles = []; blades = []; handPoints = [];
    lastSpawn = 0; startTime = 0; elapsed = 0; elapsedBase = 0;
    updateHud();
  }
  function fmtTime(s){ const m=(s/60)|0, ss=(s%60)|0; return m+':'+(ss<10?'0':'')+ss; }
  function updateHud() {
    scoreEl.textContent = score;
    comboEl.textContent = 'x' + combo;
    timeEl.textContent = fmtTime(elapsed);
    livesEl.textContent = '❤'.repeat(Math.max(0, lives)) + '·'.repeat(Math.max(0, CONFIG.lives - lives));
  }

  // 当前难度：出果间隔（随时间变短）
  function currentGap(){
    return Math.max(CONFIG.minGap, CONFIG.startGap - elapsed * CONFIG.gapRampPerSec);
  }
  // 当前难度：飞行初速系数（随时间变快）
  function currentSpeed(){
    return Math.min(CONFIG.maxSpeed, CONFIG.startSpeed + elapsed * CONFIG.speedRampPerSec);
  }
  // 当前一次出几个果（前期恒为 1，后期偶尔 2~3）
  function currentBatch(){
    if (elapsed >= CONFIG.tripleAtSec && Math.random() < CONFIG.multiChance) return 3;
    if (elapsed >= CONFIG.doubleAtSec && Math.random() < CONFIG.multiChance) return 2;
    return 1;
  }

  // ---------- 生成物体 ----------
  function spawn() {
    const isBomb = elapsed >= CONFIG.bombFreeSec && Math.random() < CONFIG.bombChance;
    const x = W * (0.15 + Math.random() * 0.7);
    const vy = -(H * (currentSpeed() + Math.random() * CONFIG.speedRandom)); // 向上初速（px/ms）
    const vx = (W * 0.5 - x) * 0.0006 + (Math.random() - 0.5) * 0.25;
    objects.push({
      x, y: H + 60, vx, vy,
      r: Math.min(W, H) * CONFIG.fruitSize,
      rot: Math.random() * 6.28, vrot: (Math.random() - 0.5) * 0.12,
      emoji: isBomb ? '💣' : FRUITS[(Math.random() * FRUITS.length) | 0],
      bomb: isBomb, sliced: false, counted: false
    });
  }

  function burst(x, y, color) {
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * 6.28, s = 1 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1, age: 0, life: 500 + Math.random()*300, color });
    }
  }

  function sliceHit(o) {
    o.sliced = true;
    if (o.bomb) {
      lives = 0; // 切炸弹直接结束
      burst(o.x, o.y, '#ff5f6d');
      navigatorVibrate(60);
      gameOver();
      return;
    }
    combo++; comboTimer = 800;
    const gain = 1 + Math.floor(combo / 3);
    score += gain;
    burst(o.x, o.y, '#ffd34d');
    navigatorVibrate(15);
    updateHud();
    // 切开的两半飞出
    for (let s = -1; s <= 1; s += 2) {
      particles.push({ x:o.x, y:o.y, vx: s*2, vy:-1, age:0, life:700, emoji:o.emoji, half:s });
    }
  }

  function navigatorVibrate(ms){ if (navigator.vibrate) { try{ navigator.vibrate(ms);}catch(e){} } }

  // ---------- 切割检测：刀尖线段 vs 水果圆 ----------
  function segCircle(x1,y1,x2,y2,cx,cy,r){
    const dx=x2-x1, dy=y2-y1;
    const l2=dx*dx+dy*dy;
    let t = l2>0 ? ((cx-x1)*dx+(cy-y1)*dy)/l2 : 0;
    t=Math.max(0,Math.min(1,t));
    const px=x1+t*dx, py=y1+t*dy;
    const ddx=cx-px, ddy=cy-py;
    return (ddx*ddx+ddy*ddy) <= r*r;
  }

  // ---------- 主循环 ----------
  function loop(ts){
    if(!running) return;
    if (!startTime) startTime = ts;
    const dt = Math.min(50, ts - (lastTs||ts)); lastTs = ts;

    // 已进行秒数 -> 驱动难度 + HUD 计时（elapsedBase 支持暂停续玩）
    const prevSec = elapsed|0;
    elapsed = elapsedBase + (ts - startTime) / 1000;
    if ((elapsed|0) !== prevSec) updateHud();

    ctx.clearRect(0,0,W,H);

    // 生成：间隔随时间变短；前期一次一个，后期偶尔多个
    if (ts - lastSpawn > currentGap()) {
      lastSpawn = ts;
      const n = currentBatch();
      for (let k = 0; k < n; k++) spawn();
    }

    // combo 计时
    if (comboTimer > 0){ comboTimer -= dt; if (comboTimer<=0) combo=0, updateHud(); }

    // 更新物体
    const g = H * CONFIG.gravity; // 重力
    for (const o of objects){
      o.vy += g*dt;
      o.x += o.vx*dt; o.y += o.vy*dt; o.rot += o.vrot;
      // 切割检测
      if (!o.sliced){
        for (const b of blades){
          if (b.speed > CONFIG.sliceSpeed && b.px!=null){
            if (segCircle(b.px,b.py,b.x,b.y,o.x,o.y,o.r)){ sliceHit(o); break; }
          }
        }
      }
      // 掉落漏判（未切的水果落出屏幕底部）
      if (!o.counted && o.y - o.r > H + 40){
        o.counted = true;
        if (!o.sliced && !o.bomb){
          lives--; combo=0; comboTimer=0; updateHud();
          if (lives<=0) gameOver();
        }
      }
    }
    objects = objects.filter(o => !(o.sliced) && o.y - o.r < H + 60 || (o.sliced && false));
    objects = objects.filter(o => o.y - o.r < H + 80 && !o.sliced);

    // 画物体
    for (const o of objects){
      ctx.save();
      ctx.translate(o.x,o.y); ctx.rotate(o.rot);
      ctx.font = (o.r*2)+'px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(o.emoji,0,0);
      ctx.restore();
    }

    // 粒子
    for (const p of particles){
      p.age += dt; p.x += p.vx; p.y += p.vy; p.vy += 0.15;
      const k = 1 - p.age/p.life;
      if (p.emoji){
        ctx.save(); ctx.globalAlpha=Math.max(0,k); ctx.translate(p.x,p.y);
        ctx.scale(p.half>0?1:-1,1); ctx.font='46px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        // 半个水果用裁剪模拟
        ctx.beginPath(); ctx.rect(0,-40,40,80); ctx.clip();
        ctx.fillText(p.emoji,0,0); ctx.restore();
      } else {
        ctx.globalAlpha=Math.max(0,k);
        ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,6.28); ctx.fill();
        ctx.globalAlpha=1;
      }
    }
    particles = particles.filter(p => p.age < p.life);

    // 画刀轨迹
    for (const b of blades){
      b.trail.push({x:b.x,y:b.y}); if (b.trail.length>10) b.trail.shift();
      ctx.beginPath();
      for (let i=0;i<b.trail.length;i++){ const t=b.trail[i]; i?ctx.lineTo(t.x,t.y):ctx.moveTo(t.x,t.y); }
      ctx.strokeStyle = b.speed>CONFIG.sliceSpeed ? 'rgba(120,220,255,0.95)' : 'rgba(120,220,255,0.35)';
      ctx.lineWidth = b.speed>CONFIG.sliceSpeed ? 8 : 4; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.shadowColor='rgba(120,220,255,0.9)'; ctx.shadowBlur=14; ctx.stroke(); ctx.shadowBlur=0;
      // 指尖光点
      ctx.beginPath(); ctx.arc(b.x,b.y,10,0,6.28); ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
    }

    requestAnimationFrame(loop);
  }

  // ---------- MediaPipe Hands ----------
  let hands, camera, camActive=false, paused=false;

  function onResults(res){
    // 更新每只手食指指尖位置 -> 画布坐标（镜像）
    const newPts = [];
    if (res.multiHandLandmarks){
      for (const lm of res.multiHandLandmarks){
        const tip = lm[8]; // index fingertip
        const x = (1 - tip.x) * W; // 镜像
        const y = tip.y * H;
        newPts.push({x,y});
      }
    }
    // 匹配到 blades（简单：按索引）
    const next = [];
    for (let i=0;i<newPts.length;i++){
      const prev = blades[i];
      const px = prev? prev.x : null, py = prev? prev.y : null;
      const speed = (px!=null)? Math.hypot(newPts[i].x-px, newPts[i].y-py) : 0;
      next.push({ x:newPts[i].x, y:newPts[i].y, px, py, speed, trail: prev?prev.trail:[] });
    }
    blades = next;
  }

  async function initHands(){
    if (hands) return;
    hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);
  }

  // 真正释放摄像头：停 MediaPipe 送帧循环 + 停掉所有轨道（指示灯灭、权限交还）
  function stopCamera(){
    try { if (camera) camera.stop(); } catch(e){}
    const s = video.srcObject;
    if (s && s.getTracks) { s.getTracks().forEach(t => { try{ t.stop(); }catch(e){} }); }
    video.srcObject = null;
    camActive = false;
  }

  async function startCamera(){
    await initHands();
    // 每次重新拿一个新流并新建 Camera，避免复用已停止的轨道
    camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 640, height: 480, facingMode: 'user'
    });
    await camera.start();
    camActive = true;
  }

  // ---------- 开始 / 结束 ----------
  async function start(){
    btn.disabled = true;
    statusEl.textContent = '正在启动摄像头…';
    try{
      await startCamera();
    }catch(e){
      statusEl.textContent = '摄像头启动失败：' + (e && e.message ? e.message : e) + '（需 HTTPS + 授权）';
      btn.disabled = false; return;
    }
    overlay.classList.add('hidden');
    hud.classList.remove('hidden');
    reset();
    running = true; lastTs = 0;
    requestAnimationFrame(loop);
  }

  function gameOver(){
    if (!running) return;
    running = false;
    stopCamera(); // 游戏结束就交还摄像头
    setTimeout(()=>{
      emojiEl.textContent = '💥';
      titleEl.textContent = '游戏结束';
      finalScoreEl.classList.remove('hidden');
      finalScoreEl.textContent = `最终得分 ${score} · 存活 ${fmtTime(elapsed)}`;
      btn.textContent = '再来一局';
      btn.disabled = false;
      statusEl.textContent = '';
      overlay.classList.remove('hidden');
      hud.classList.add('hidden');
    }, 300);
  }

  btn.addEventListener('click', start);

  // ---------- 切走标签页 / 隐藏 → 释放摄像头；切回来自动恢复 ----------
  async function pauseGame(){
    if (!running || paused) return;
    paused = true;
    running = false;
    elapsedBase = elapsed;   // 冻结难度进度
    startTime = 0;
    stopCamera();            // 真正关掉摄像头，交还权限、灭指示灯
    statusEl.textContent = '';
  }
  async function resumeGame(){
    if (!paused) return;
    try{
      await startCamera();
    }catch(e){
      // 恢复失败（比如权限被撤）→ 回到开始界面
      paused = false;
      overlay.classList.remove('hidden'); hud.classList.add('hidden');
      titleEl.textContent = '摄像头已暂停';
      statusEl.textContent = '点“继续”重新授权摄像头';
      btn.textContent = '继续'; btn.disabled = false;
      return;
    }
    paused = false;
    running = true; lastTs = 0;
    requestAnimationFrame(loop);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) pauseGame();
    else if (paused) resumeGame();
  });
  window.addEventListener('pagehide', stopCamera);
  window.addEventListener('beforeunload', stopCamera);

  // 安全上下文提示
  if (!(window.isSecureContext)) {
    statusEl.textContent = '⚠️ 当前非 HTTPS，Safari 会拒绝摄像头。请用 https 打开。';
  }
})();
</script>
</body>
</html>
